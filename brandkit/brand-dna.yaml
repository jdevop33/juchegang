# ═══════════════════════════════════════════════════════════════
# BRAND DNA: JUCHEGANG / 주체강 (SUBJECTIVE RIVER)
# Updated: February 2026
# ═══════════════════════════════════════════════════════════════

brand:
  name: "JucheGang"
  korean_name: "주체강"
  korean_meaning: "Subjective River"
  english_meaning: "The Juche Crew — self-reliant thinkers navigating together"
  domain: "JucheGang.ca"
  alternate_domains:
    - "Juche.org"

  tagline_primary: "Navigate the Current"
  tagline_secondary: "Your River. Your Path."
  tagline_korean: "주체의 흐름을 따라" # "Follow the Flow of Juche"

  philosophy: |
    Life is a subjective river — a personal current you cannot fight.
    You can struggle against it and fail, or turn around, read the flow,
    and let the current carry you forward. Self-reliance isn't about
    brute force against reality. It's understanding your own agency
    within forces bigger than you. The river is different for everyone.
    That's radical subjectivity. That's Juche at its core.

  brand_story: |
    JucheGang was born as a movement — a crew of independent thinkers
    building bridges across cultures, challenging Western narratives
    through factual analysis and radical transparency. When Google
    Translate rendered "JucheGang" into Korean as 주체강 — "Subjective
    River" — it didn't break the brand. It revealed its soul. The
    English name carries the energy of community and collective action.
    The Korean meaning carries the philosophy underneath: life as a
    flowing, personal current you align with rather than fight. Two
    languages, one truth.

  industry: "Geopolitical Advocacy / Korean Reunification / Cultural Bridge-Building"
  target_audience:
    primary: "Internationally-minded professionals, Korea-interested audiences"
    secondary: "Defense/aerospace/nuclear professionals engaging with technical content"
    tertiary: "Korean diaspora, reunification advocates, independent thinkers"
  personality:
    - philosophical   # Core — the river, the Dao, Eastern wisdom
    - bold            # Exterior — unapologetic, radical transparency
    - professional    # When needed — credible, data-driven, serious
    - rebellious      # Challenges narratives, questions status quo
    - bridge-builder  # Connects cultures, not divides them

  tone_of_voice:
    default: "Confident and grounded, like someone who's been through storms and found their current"
    social_media: "Bold, provocative but factual, conversation-starting"
    professional: "Data-driven, credible, measured but not afraid to challenge"
    philosophical: "Flowing, poetic, Eastern-influenced wisdom"

  platforms:
    primary:
      - LinkedIn (17,000+ followers)
      - Facebook (hundreds of accounts)
      - VK
      - WeChat
    secondary:
      - X/Twitter
      - Instagram
      - Telegram
    websites:
      - JucheGang.ca
      - Juche.org

